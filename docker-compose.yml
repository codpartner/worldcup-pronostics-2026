services:
  pronostics:
    build: .
    env_file:
      - .env
    environment:
      DOMAIN: ${DOMAIN:-}
      PORT: "3000"
    expose:
      - "3000"
    volumes:
      - pronostics-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3000/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  caddy:
    image: caddy:2-alpine
    depends_on:
      pronostics:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env — e.g. pronostics.codpartner.com}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  pronostics-data:
  caddy-data:
  caddy-config:
